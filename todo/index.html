<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <title>TODO-List</title>
</head>
<body>

    <!-- daftar aktivitas -->

    <!-- notifikasi -->
    <div class="modal"></div>
    <script src="./dist/main.js"></script>
</body>
</html>
