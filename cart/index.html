<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/typescript.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + TS</title>
</head>
<body>
    <main id="app">
        <section id="products"></section>

        <!-- Modal -->
        <section id="modal" class="modal" style="display: none;">
            <p id="modalText"></p>
            <button type="button" class="close-btn">Tutup</button>
        </section>
    
        <!-- Bagian Keranjang -->
        <section id="cart">
            <button id="checkout-btn">Checkout</button>
            <button id="clear-btn">Kosongkan</button>
            <p>Total: Rp<span id="totalPrice">0</span></p>
            <h2>Keranjang (<span id="totalItem">0</span>)</h2>
            <div id="cartItems"></div>
        </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
