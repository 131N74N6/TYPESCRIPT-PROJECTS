<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/typescript.svg"/>
    <link rel="stylesheet" href="../css/detail.css"/>
    <title>Image Detail</title>
</head>
<body>
    <header>
        <input type="checkbox" id="dark-mode"/>
        <label for="dark-mode">Dark Mode</label>
        <a href="gallery.html" class="back-button">Kembali</a>
    </header>
    <main id="detail">
        <section id="detail-images">
            <section id="carousel-wrap"></section>
            <section class="navigation">
                <button type="button" id="prev-button">&larr;</button>
                <button type="button" id="next-button">&rarr;</button>
            </section>
        </section>
        <section class="image-metadata">
            <h1 id="image-title"></h1>
            <p id="image-category"></p>
            <section class="button-wrap">
                <button type="button" id="edit-mode">Edit</button>
                <button type="button" id="delete-button">Delete</button>
            </section>
        </section>
    </main>
    <script src="../ts/detail.ts" type="module"></script>
</body>
</html>
