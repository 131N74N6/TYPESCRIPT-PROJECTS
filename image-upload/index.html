<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <title>checkbox filter</title>
</head>
<body>
    <section id="modal"></section>

    <header>
        <section>
            <button type="button" id="delete-all">Delete All</button>
            <button type="button" id="add-data">Add Image</button>
            <input type="checkbox" id="dark-mode"/>
            <label for="dark-mode">Dark Mode</label>
        </section>
        <section id="filters">
            <div class="filter-1">
                <input type="checkbox" id="Anime" value="anime" checked/>
                <label for="Anime">Anime</label>
            </div>
            <div class="filter-2">
                <input type="checkbox" id="buildings/urbans" value="buildings/urbans" checked/>
                <label for="buildings/urbans">Buildings/Urbans</label>
            </div>
            <div class="filter-3">
                <input type="checkbox" id="nature" value="nature" checked/>
                <label for="nature">Nature</label>
            </div>
            <div class="filter-4">
                <input type="checkbox" id="cartoon" value="cartoon" checked/>
                <label for="cartoon">Cartoon</label>
            </div>
        </section>
    </header>

    <main class="content">    
        <form id="dataForm">
            <input type="text" id="name" placeholder="Name" required>
            <select id="category" title="img-category" required>
                <option value="anime">Anime</option>
                <option value="buildings/urbans">Buildings/Urbans</option>
                <option value="nature">Nature</option>
                <option value="cartoon">Cartoon</option>
            </select>
            <input type="file" id="image" accept="image/*" title="image-file"/>
            <div class="preview-img">
                <img src="./image/default-profile-picture.jpg" title="image" 
                id="image-preview" alt="preview"/>
            </div>
            <div class="form-button">
                <button type="submit">Save</button>
                <button type="button" id="close-form">Close</button>
            </div>
        </form>
        
        <section id="itemsContainer"></section>
        <section id="empty-message"></section>
    </main>

    <script src="./dist/index.js" type="module"></script>
</body>
</html>
