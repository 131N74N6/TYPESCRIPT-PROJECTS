<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Management</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <section id="modal"></section>
    <header id="header">
        <button type="button" id="delete-all-docxs">Delete-All</button>
    </header>
    <main class="container">
        <form id="upload-doc-section" title="upload-section">
            <input type="text" id="username" placeholder="input your username..."/>
            <input type="file" id="file-input" accept=".pdf,.doc,.docx,.txt,.jpg,.png,.jpeg" required>
            <div id="preview"></div>
            <div id="fileName"></div>
            <div class="button-wrap">
                <button type="button" id="reset-form">Reset</button>
                <button type="submit" id="submit-btn">Add File</button>
            </div>
        </form>
        <section class="documents-list" id="documents-list"></section>
    </main>
    <script type="module" src="./dist/index.js"></script>
</body>
</html>
