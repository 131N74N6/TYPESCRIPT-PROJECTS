<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Management</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <section id="modal"></section>
    <header id="header">
        <button type="button" id="delete-all-docxs">Delete-All</button>
    </header>
    <main class="container">
        <form class="upload-doc-section">
            <input type="text" id="username" placeholder="masukkan username..."/>
            <input type="file" class="file-input" id="file-input" accept=".pdf,.doc,.docx,.jpg,.png">
            <img src="" id="preview"/>
            <span id="fileName"></span>
            <div class="button-wrap">
                <button class="upload-btn" id="uploadBtn">Choose File</button>
                <button type="submit" id="submit-btn">Add File</button>
            </div>
        </form>
        <section class="documents-list" id="documents-list"></section>
    </main>
    <script type="module" src="./dist/index.js"></script>
</body>
</html>
