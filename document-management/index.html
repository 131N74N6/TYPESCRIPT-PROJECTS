<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Management</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" 
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" 
        crossorigin="anonymous" 
        referrerpolicy="no-referrer" 
    />
</head>
<body>
    <header id="header">
        <button type="button" id="delete-all-docxs">Delete-All</button>
    </header>
    <section id="modal"></section>
    <main class="container">
        <form id="upload-doc-section" title="upload-section">
            <input type="text" id="username" placeholder="input your username..." autocomplete="username"/>
            <input type="file" id="file-input" title="file" accept=".pdf,.doc,.docx,.txt,.jpg,.png,.jpeg" required>
            <div id="preview"></div>
            <div id="fileName"></div>
            <div class="button-wrap">
                <button type="button" id="reset-form">Reset</button>
                <button type="submit" id="submit-btn">Add Data</button>
            </div>
        </form>
        <section class="documents-list" id="documents-list"></section>
    </main>
    <script type="module" src="./dist/index.js"></script>
</body>
</html>
